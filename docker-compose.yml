name: sveltekit-fastapi-template

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Override these in a .env file next to this compose file, or here.
      SECRET_KEY: ${SECRET_KEY:-CHANGE_ME_dev_only_secret_padded_to_32_bytes_minimum}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,tauri://localhost,http://tauri.localhost}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URL the BROWSER uses to reach the API — keep it host-reachable,
        # not the docker-internal "backend" hostname.
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
